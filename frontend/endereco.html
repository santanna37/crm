<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Endereço</title>

    <!-- Bootstrap 5.3 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f5f7fb;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .card {
        max-width: 720px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title mb-3">Endereço</h4>
        <form id="enderecoForm" novalidate>
          <div class="row g-3">
            <div class="col-12">
              <label for="rua" class="form-label">Rua</label>
              <input
                type="text"
                id="rua"
                name="rua"
                class="form-control"
                required
              />
              <div class="invalid-feedback">Informe a rua.</div>
            </div>

            <div class="col-12 col-md-4">
              <label for="cep" class="form-label">CEP</label>
              <input
                type="text"
                id="cep"
                name="cep"
                class="form-control"
                maxlength="9"
                placeholder="00000-000"
                required
              />
              <div class="invalid-feedback">Informe um CEP válido.</div>
            </div>

            <div class="col-12 col-md-4">
              <label for="numero" class="form-label">Número</label>
              <input
                type="text"
                id="numero"
                name="numero"
                class="form-control"
                required
              />
              <div class="invalid-feedback">Informe o número.</div>
            </div>

            <div class="col-12 col-md-4">
              <label for="complemento" class="form-label">Complemento</label>
              <input
                type="text"
                id="complemento"
                name="complemento"
                class="form-control"
              />
            </div>

            <div class="col-12 col-md-6">
              <label for="bairro" class="form-label">Bairro</label>
              <input
                type="text"
                id="bairro"
                name="bairro"
                class="form-control"
                required
              />
              <div class="invalid-feedback">Informe o bairro.</div>
            </div>

            <div class="col-12 col-md-6">
              <label for="cidade" class="form-label">Cidade</label>
              <input
                type="text"
                id="cidade"
                name="cidade"
                class="form-control"
                required
              />
              <div class="invalid-feedback">Informe a cidade.</div>
            </div>

            <div class="col-8 col-md-6 col-lg-8">
              <label for="estado" class="form-label">Estado</label>
              <input
                type="text"
                id="estado"
                name="estado"
                class="form-control"
                required
              />
              <div class="invalid-feedback">Informe o estado.</div>
            </div>

            <div class="col-4 col-md-6 col-lg-4">
              <label for="uf" class="form-label">UF</label>
              <input
                type="text"
                id="uf"
                name="uf"
                class="form-control text-uppercase"
                maxlength="2"
                required
              />
              <div class="invalid-feedback">Informe a UF (2 letras).</div>
            </div>

            <div class="col-12 d-flex justify-content-end gap-2">
              <button type="reset" class="btn btn-outline-secondary">
                Limpar
              </button>
              <button type="submit" class="btn btn-primary">
                Salvar endereço
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // Máscara simples para CEP e uppercase em UF
      document.getElementById("cep").addEventListener("input", function (e) {
        let v = e.target.value.replace(/\D/g, "");
        if (v.length > 5) v = v.slice(0, 5) + "-" + v.slice(5, 8);
        e.target.value = v;
      });

      document.getElementById("uf").addEventListener("input", function (e) {
        e.target.value = e.target.value
          .replace(/[^A-Za-z]/g, "")
          .toUpperCase()
          .slice(0, 2);
      });

      // Validação Bootstrap
      (function () {
        "use strict";
        const form = document.getElementById("enderecoForm");
        form.addEventListener(
          "submit",
          function (event) {
            if (
              !form.checkValidity() ||
              !/^\d{5}-\d{3}$/.test(document.getElementById("cep").value) ||
              document.getElementById("uf").value.length !== 2
            ) {
              event.preventDefault();
              event.stopPropagation();
            } else {
              event.preventDefault();
              const data = Object.fromEntries(new FormData(form).entries());
              console.log("Endereço salvo:", data);
              alert("Endereço salvo (ver console).");
              form.classList.remove("was-validated");
              form.reset();
            }
            form.classList.add("was-validated");
          },
          false,
        );
      })();
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disparador de Email</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="page-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-chart-line"></i>
                    <span>Ferramentas</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>Dashboard</span>
                </a>
                <a href="lista.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Listar Usuários</span>
                </a>
                <a href="disparo.html" class="nav-item active">
                    <i class="fas fa-paper-plane"></i>
                    <span>Disparador de Email</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn btn-ghost btn-full">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Sair</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-wrapper">
                <!-- Header -->
                <header class="top-header">
                    <div class="header-brand">
                        <div class="header-logo">Candidato 2026</div>
                        <h1 class="header-title">Disparador de Email</h1>
                    </div>
                    <div class="header-user">
                        <div class="user-info">
                            <span class="user-name">Admin User</span>
                            <span class="user-role">Administrador</span>
                        </div>
                        <div class="user-avatar">AU</div>
                    </div>
                </header>

                <!-- Em Construção -->
                <section class="card" style="text-align: center; padding: var(--space-3xl);">
                    <i class="fas fa-cogs" style="font-size: 4rem; color: var(--primary); margin-bottom: var(--space-lg);"></i>
                    <h2 style="color: var(--text); margin-bottom: var(--space-md); font-size: var(--font-size-2xl);">Disparador de Email</h2>
                    <p style="color: var(--text-light); max-width: 600px; margin: 0 auto;">
                        Esta funcionalidade está em desenvolvimento. Em breve você poderá enviar emails em massa para os apoiadores filtrados.
                    </p>
                    <div style="margin-top: var(--space-xl);">
                        <a href="lista.html" class="btn btn-primary">
                            <i class="fas fa-users"></i> Ver Lista de Apoiadores
                        </a>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.requireAuth()) return;
            Auth.setupLogoutButton();
        });
    </script>
</body>
</html>

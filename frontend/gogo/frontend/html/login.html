<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Área Administrativa</title>
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="page-login">
    <div class="login-container">
        <!-- Header -->
        <header class="top-header" style="margin-bottom: var(--space-lg);">
            <div class="header-brand" style="width: 100%; justify-content: center;">
                <div class="header-logo"><i class="fas fa-shield-alt"></i> Admin</div>
                <h1 class="header-title">Área de Administração</h1>
            </div>
        </header>

        <!-- Login Card -->
        <div class="login-card">
            <div class="login-body">
                <div class="login-header">
                    <div class="login-icon"><i class="fas fa-user-lock"></i></div>
                    <h2>Autenticação Necessária</h2>
                    <p>Área administrativa para gestão de apoiadores</p>
                </div>

                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" name="email" placeholder="admin@exemplo.com" required autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="password"><i class="fas fa-lock"></i> Senha</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                            <button type="button" id="togglePassword" class="toggle-password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember" name="remember">
                            <span>Lembrar-me</span>
                        </label>
                        <a href="#" class="forgot-link">Esqueci minha senha</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-large btn-full" id="submit-btn">
                        <span class="btn-text">Entrar</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>

                    <div id="error-message" class="alert alert-error hidden">
                        <i class="fas fa-exclamation-circle"></i>
                        <span></span>
                    </div>
                </form>

                <div class="login-footer">
                    <p>Área restrita a administradores autorizados</p>
                    <p class="security-info"><i class="fas fa-shield-alt"></i> Conexão segura</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/login.js"></script>
</body>
</html>

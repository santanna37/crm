<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links - Candidato 2026</title>
    <link rel="stylesheet" href="/gogo/frontend/css/theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="page-index">
    <div class="bg-layer"></div>
    <div class="bg-overlay"></div>

    <div class="container container-sm">
        <!-- Perfil -->
        <div class="profile-section">
            <div class="profile-avatar">
                <img src="https://res.cloudinary.com/do09iiryt/image/upload/v1778164122/python_tribal_verde_roxo_kbnbst.png" alt="Logo Campanha">
            </div>
            <h1 class="profile-name">Candidato 2026<br>SEU SLOGAN</h1>
            <p class="profile-bio">Juntos pelo futuro</p>
        </div>

        <!-- Links -->
        <div class="links-list">
            <a href="./html/cadastro.html" class="link-button">
                <i class="fas fa-user-plus"></i>
                <span>Seja um Apoiador</span>
            </a>
            <a href="./html/home.html" class="link-button">
                <i class="fas fa-users"></i>
                <span>Saiba mais do nosso candidato</span>
            </a>
            <a href="./html/calendario.html" class="link-button">
                <i class="fas fa-calendar-alt"></i>
                <span>Calendário da Campanha</span>
            </a>
            <a href="./html/fundacao.html" target="_blank" class="link-button">
                <i class="fas fa-hand-holding-heart"></i>
                <span>Proponha uma agenda/evento</span>
            </a>
            <a href="./html/fundacao.html" class="link-button link-email">
                <i class="fas fa-star"></i>
                <span>Apoie o Projeto</span>
            </a>
            <a href="https://chat.whatsapp.com/#" target="_blank" class="link-button link-whatsapp">
                <i class="fab fa-whatsapp"></i>
                <span>Falar no WhatsApp</span>
            </a>
            <a href="https://www.instagram.com/" target="_blank" class="link-button link-instagram">
                <i class="fab fa-instagram"></i>
                <span>Seguir no Instagram</span>
            </a>
            <a href="mailto:candidato2026@email.com" class="link-button link-email">
                <i class="fas fa-envelope"></i>
                <span>Enviar E-mail</span>
            </a>
        </div>

        <!-- Redes Sociais -->
        <div class="social-links">
            <a href="https://facebook.com" target="_blank" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
            <a href="https://twitter.com" target="_blank" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
            <a href="https://linkedin.com" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
            <a href="https://youtube.com" target="_blank" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
        </div>

        <!-- Footer -->
        <footer class="page-footer">
            <p>2026 — Todos os direitos reservados</p>
        </footer>
    </div>

    <script src="/gogo/frontend/javascript/index.js"></script>
</body>
</html>

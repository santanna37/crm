<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Claudinho2026</title>
    <link rel="stylesheet" href="/frontend/css/styles_login.css">
    <!-- Ícones (Font Awesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <i class="fas fa-shield-alt"></i>
                    <span>Admin</span>
                </div>
                <h1>Área de Administração</h1>
            </div>
        </header>

        <!-- Formulário de Login -->
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-icon">
                        <i class="fas fa-user-lock"></i>
                    </div>
                    <h2>Autenticação Necessária</h2>
                    <p>Área administrativa para gestão de apoiadores</p>
                </div>

                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            Email
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="admin@exemplo.com" 
                            required
                            autocomplete="email"
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            Senha
                        </label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="••••••••" 
                                required
                                autocomplete="current-password"
                            >
                            <button type="button" id="togglePassword" class="toggle-password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember" name="remember">
                            <span>Lembrar-me</span>
                        </label>
                        <a href="#" class="forgot-link">Esqueci minha senha</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-large">
                        <span class="btn-text">Entrar</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>

                    <div id="error-message" class="error-message hidden">
                        <i class="fas fa-exclamation-circle"></i>
                        <span></span>
                    </div>
                </form>

                <div class="login-footer">
                    <p>Área restrita a administradores autorizados</p>
                    <p class="security-info">
                        <i class="fas fa-shield-alt"></i>
                        Conexão segura
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="/frontend/javascript/script_login.js"></script>
</body>
</html>

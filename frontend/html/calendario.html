<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário 2026 - Ouvidor do Povo</title>
    <link rel="stylesheet" href="/frontend/css/styles_calendario.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <span class="hero-tag">ouvidor do povo</span>
            <h1 class="hero-title">Calendário 2026</h1>
            <p class="hero-subtitle">Acompanhe as atividades, reuniões e eventos do ano</p>
        </div>
    </header>

    <main class="container">
        <section class="calendar-nav">
            <button class="nav-arrow" id="prevMonth" aria-label="Mês anterior">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <h2 class="month-title" id="monthTitle">Janeiro 2026</h2>
            <button class="nav-arrow" id="nextMonth" aria-label="Próximo mês">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </section>

        <section class="events-list" id="eventsList">
            <!-- Eventos renderizados via JS -->
        </section>

        <section class="empty-state hidden" id="emptyState">
            <div class="empty-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            </div>
            <h3>Nenhum evento neste mês</h3>
            <p>Selecione outro mês para visualizar as atividades.</p>
        </section>
    </main>

    <footer class="site-footer">
        <p>Calendário 2026 — Ouvidor do Povo. Todos os direitos reservados.</p>
    </footer>

    <script src="/frontend/javascript/script_calendario.js"></script>
</body>
</html>

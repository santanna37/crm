<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links - Claudinho2026</title>
    <link rel="stylesheet" href="css/styles_index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Fundo com foto + overlay escuro -->
    <div class="bg-layer"></div>
    <div class="bg-overlay"></div>

    <div class="container">
        <!-- Perfil -->
        <div class="profile">
            <div class="avatar">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/PT_%28Brazil%29_logo_2021.svg/960px-PT_%28Brazil%29_logo_2021.svg.png" alt="Logo PT">
            </div>
            <h1>Claudinho <br> OUVIDOR DO POVO</h1>
            <p class="bio">2026</p>
        </div>

        <!-- Links -->
        <div class="links">
            <!-- Botão 1: Formulário de Cadastro -->
            <a href="/frontend/html/cadastro.html" class="link-button">
                <i class="fas fa-user-plus"></i>
                <span>Seja um Apoiador</span>
            </a>

            <!-- Botão 2: Site pessoal -->
            <a href="/frontend/html/home.html" class="link-button">
                <i class="fas fa-users"></i>
                <span>Saiba mais do nosso candidato</span>
            </a>

            <!-- Botão 3: Calendario -->
            <a href="/frontend/html/calendario.html" class="link-button">
                <i class="fas fa-calendar-alt"></i>
                <span>Calendário da Campanha</span>
            </a>

            <!-- Botão 4: Proponha agenda -->
            <a href="https://forms.gle/Zbf222yi3a4negWb9" target="_blank" class="link-button">
                <i class="fas fa-hand-holding-heart"></i>
                <span>Proponha uma agenda/evento</span>
            </a>

            <!-- Botão 5: fundação claudinho -->
            <a href="/frontend/html/fundacao.html" class="link-button email">
                <i class="fas fa-star"></i>
                <span>Apoie o instituto Ouvidoria Popular</span>
            </a>

            <!-- Botão 5: WhatsApp -->
            <a href="https://chat.whatsapp.com/HFrd79nQFG7HeQbLchvehW?mode=gi_t" target="_blank" class="link-button whatsapp">
                <i class="fab fa-whatsapp"></i>
                <span>Falar no WhatsApp</span>
            </a>

            <!-- Botão 6: Instagram -->
            <a href="https://www.instagram.com/claudinhosilvaouvidor?igsh=MTZlemtiNHAzZHhnag==" target="_blank" class="link-button instagram">
                <i class="fab fa-instagram"></i>
                <span>Seguir no Instagram</span>
            </a>

            <!-- Botão 7: Email -->
            <a href="mailto:claudinhosilvaouvidor@gmail.com" class="link-button email">
                <i class="fas fa-envelope"></i>
                <span>Enviar E-mail</span>
            </a>
        </div>

        <!-- Redes Sociais -->
        <div class="social-icons">
            <a href="https://facebook.com" target="_blank" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
            <a href="https://twitter.com" target="_blank" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
            <a href="https://www.instagram.com/claudinhosilvaouvidor?igsh=MTZlemtiNHAzZHhnag==" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
            <a href="https://youtube.com" target="_blank" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
        </div>

        <!-- Footer -->
        <footer>
           
            <p> <a href=https://anansiaweb.vercel.app/ class="btn-anansia" target="_blank">ANANSIA WEB</a> — FEITO POR HUMANOS — Todos os direitos reservados</p>
        </footer>

</html>

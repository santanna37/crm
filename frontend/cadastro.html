<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cadastro</title>

    <!-- Bootstrap 5.3 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f5f7fb;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .card {
        max-width: 920px;
        width: 100%;
      }
      .form-section {
        max-height: 56vh;
        overflow: auto;
        padding-right: 0.5rem;
      }
      /* suaviza barra de rolagem em navegadores que suportam */
      .form-section::-webkit-scrollbar {
        width: 8px;
      }
      .form-section::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.12);
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title mb-3">Formulário de Cadastro</h3>
        <form id="cadastroForm" novalidate>
          <div class="row g-3">
            <!-- Dados pessoais básicos -->
            <div class="col-12 col-md-6">
              <label for="nome" class="form-label">Nome completo</label>
              <input
                type="text"
                class="form-control"
                id="nome"
                name="nome"
                required
              />
              <div class="invalid-feedback">Informe seu nome.</div>
            </div>

            <div class="col-12 col-md-6">
              <label for="email" class="form-label">E-mail</label>
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                required
              />
              <div class="invalid-feedback">Informe um e-mail válido.</div>
            </div>

            <div class="col-12 col-md-6">
              <label for="telefone" class="form-label">Telefone</label>
              <input
                type="tel"
                class="form-control"
                id="telefone"
                name="telefone"
              />
            </div>

            <div class="col-12 col-md-6">
              <label for="cidade" class="form-label">Cidade</label>
              <input
                type="text"
                class="form-control"
                id="cidade"
                name="cidade"
              />
            </div>

            <!-- Título da seção de interesses - ocupa toda a largura -->
            <div class="col-12">
              <h5 class="mt-2">Áreas de Interesse</h5>
              <p class="text-muted small">Selecione uma ou mais opções</p>
            </div>

            <!-- Checkboxes agrupados -->
            <div class="col-12">
              <div class="row g-2 form-section">
                <!-- Usamos col-12 col-sm-6 col-lg-4 para responsividade -->
                <div class="col-12 col-sm-6 col-lg-4">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      value="Educacao"
                      id="educacao"
                      name="interesses[]"
                    />
                    <label class="form-check-label" for="educacao"
                      >Educação</label
                    >
                  </div>
                </div>

                <div class="col-12 col-sm-6 col-lg-4">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      value="Saude"
                      id="saude"
                      name="interesses[]"
                    />
                    <label class="form-check-label" for="saude">Saúde</label>
                  </div>
                </div>

                <div class="col-12 col-sm-6 col-lg-4">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      value="TrabalhoRenda"
                      id="trabalho"
                      name="interesses[]"
                    />
                    <label class="form-check-label" for="trabalho"
                      >Trabalho e Renda</label
                    >
                  </div>
                </div>

                <div class="col-12 col-sm-6 col-lg-4">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      value="Moradia"
                      id="moradia"
                      name="interesses[]"
                    />
                    <label class="form-check-label" for="moradia"
                      >Moradia</label
                    >
                  </div>
                </div>

                <div class="col-12 col-sm-6 col-lg-4">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      value="SegurancaPublica"
                      id="seguranca"
                      name="interesses[]"
                    />
                    <label class="form-check-label" for="seguranca"
                      >Segurança Pública</label
                    >
                  </div>
                </div>

                <div class="col-12 col-sm-6 col-lg-4">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      value="ReformaAgraria"
                      id="reforma"
                      name="interesses[]"
                    />
                    <label class="form-check-label" for="reforma"
                      >Reforma Agrária</label
                    >
                  </div>
                </div>

                <div class="col-12 col-sm-6 col-lg-4">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      value="IgualdadeGenero"
                      id="genero"
                      name="interesses[]"
                    />
                    <label class="form-check-label" for="genero"
                      >Igualdade de Gênero</label
                    >
                  </div>
                </div>

                <div class="col-12 col-sm-6 col-lg-4">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      value="JusticaSocial"
                      id="justica"
                      name="interesses[]"
                    />
                    <label class="form-check-label" for="justica"
                      >Justiça Social</label
                    >
                  </div>
                </div>

                <div class="col-12 col-sm-6 col-lg-4">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      value="DireitosLGBT"
                      id="lgbt"
                      name="interesses[]"
                    />
                    <label class="form-check-label" for="lgbt"
                      >Direitos LGBT</label
                    >
                  </div>
                </div>

                <div class="col-12 col-sm-6 col-lg-4">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      value="IgualdadeRacial"
                      id="racial"
                      name="interesses[]"
                    />
                    <label class="form-check-label" for="racial"
                      >Igualdade Racial</label
                    >
                  </div>
                </div>

                <div class="col-12 col-sm-6 col-lg-4">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      value="MilitanciaDigital"
                      id="militancia"
                      name="interesses[]"
                    />
                    <label class="form-check-label" for="militancia"
                      >Militância Digital</label
                    >
                  </div>
                </div>

                <div class="col-12 col-sm-6 col-lg-4">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      value="Cultura"
                      id="cultura"
                      name="interesses[]"
                    />
                    <label class="form-check-label" for="cultura"
                      >Cultura</label
                    >
                  </div>
                </div>

                <div class="col-12 col-sm-6 col-lg-4">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      value="MeioAmbiente"
                      id="meioambiente"
                      name="interesses[]"
                    />
                    <label class="form-check-label" for="meioambiente"
                      >Meio Ambiente</label
                    >
                  </div>
                </div>

                <div class="col-12 col-sm-6 col-lg-4">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      value="Outros"
                      id="outros"
                      name="interesses[]"
                    />
                    <label class="form-check-label" for="outros">Outros</label>
                  </div>
                </div>
              </div>
            </div>

            <!-- Observações -->
            <div class="col-12">
              <label for="observacoes" class="form-label"
                >Observações (opcional)</label
              >
              <textarea
                class="form-control"
                id="observacoes"
                name="observacoes"
                rows="3"
              ></textarea>
            </div>

            <!-- Botões -->
            <div class="col-12 d-flex justify-content-end gap-2">
              <button type="reset" class="btn btn-outline-secondary">
                Limpar
              </button>
              <button type="submit" class="btn btn-primary">
                Enviar cadastro
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- Bootstrap 5.3 JS (Popper incluído) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // Validação de formulário Bootstrap
      (function () {
        "use strict";
        const form = document.getElementById("cadastroForm");
        form.addEventListener(
          "submit",
          function (event) {
            if (!form.checkValidity()) {
              event.preventDefault();
              event.stopPropagation();
            } else {
              event.preventDefault(); // remover se quiser submeter realmente
              // Exemplo: coletar dados e mostrar no console (substitua por envio via fetch)
              const data = new FormData(form);
              const obj = {};
              for (const [k, v] of data.entries()) {
                if (k === "interesses[]") {
                  obj.interesses = obj.interesses || [];
                  obj.interesses.push(v);
                } else {
                  obj[k] = v;
                }
              }
              console.log("Dados do formulário:", obj);
              // Feedback visual simples
              alert("Cadastro enviado (ver console).");
              form.reset();
            }
            form.classList.add("was-validated");
          },
          false,
        );
      })();
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles_cadastro.css">
    <title>Formulário de Cadastro</title>
</head>
<body>
    <div class="container-forms">
        <h1>Formulário de Apoiadores</h1>

        <form id="cadastroForm" class="forms-card">
            <h2>Dados Pessoais</h2>

            <div class="form-group">
                <label for="person_full_name">Nome Completo</label>
                <input  type="text"
                        id="person_full_name"
                        name="full_name"
                        placeholder="Digite seu nome completo"
                        required
                        >
            </div>

            <div class="form-group">
                <label for="person-cpf">CPF</label>
                <input  type="text"
                        id="person-cpf"
                        name="cpf"
                        placeholder="Apenas números"
                        pattern="[0-9]{11}"
                        maxlength="11"
                        required
                >
            </div>
            
            <div class="form-group">
                <label for="person_date"> Data de Nascimento</label>
                <input  type="date"
                        id="person_date"
                        name="birth_date"
                        required
                >
            </div>

            <h2>Dados de Contato</h2>

            <div class="form-group">
                <label for="person-phone">Telefone</label>
                <input  type="text"
                        id="person-phone"
                        name="phone"
                        placeholder="Whatssapp mais usado"
                        required
                >
            </div>
            
            <div class="form-group">
                <label for="person_email"> Email </label>
                <input  type="email"
                        id="person_email"
                        name="email"
                        placeholder="Digite o email mais usado"
                        required
                >
            </div>

            <h2>Dados de Endereço</h2>

            <div class="form-group">
                <label for="person-cep">CEP</label>
                <input  type="text"
                        id="person-cep"
                        name="cep"
                        placeholder="apenas os numeros"
                        required
                >
            </div>

            <div class="form-group">
                <label for="person-street">Endereço</label>
                <input  type="text"
                        id="person-street"
                        name="street"
                        required
                > 
            </div>

            <div class="form-group">
                <label for="street-number">Número</label>
                <input  type="text"
                        id="street-number"
                        name="number"
                        
                >
            </div>

            <div class="form-group">
                <label for="street-complement">Complemento</label>
                <input  type="text"
                        id="street-complement"
                        name="complement"
                >
            </div>

            <div class="form-group">
                <label for="street-burgh">Bairro</label>
                <input  type="text"
                        id="street-burgh"
                        name="burgh"
                >
            </div>

            <div class="form-group">
                <label for="street-city">Cidade</label>
                <input  type="text"
                        id="street-city"
                        name="city"
                        required
                >
            </div>

            <div class="form-group">
                <label for="person-state">Estado</label>
                <input  type="text"
                        id="person-state"
                        name="state_name"
                        required
                >
            </div>

            <div class="form-group">
                <label for="uf-state">UF</label>
                <input  type="text"
                        id="uf-state"
                        name="state_uf"
                        required
                >
            </div>
            
            <h2>Temas de Interesse</h2>
            <div class="themes-container">

                <div class="form">
                    <label for="theme-educacao">Educação</label>
                    <input  type="checkbox"
                            id="theme-educacao"
                            name="themes"
                            value="Educação"
                    >
                </div>

                <div class="form">
                    <label for="theme-saude">Saúde</label>
                    <input  type="checkbox"
                            id="theme-saude"
                            name="themes"
                            value="Saúde"
                    >
                </div>
                
                <div class="form">
                    <label for="theme-assis-social">Assistência Social</label>
                    <input type="checkbox"
                            id="theme-assis-social"
                            name="themes" 
                            value="Assistência Social">
                </div>

                <div class="form">
                    <label for="theme-cultura">Cultura</label>
                    <input type="checkbox" 
                            id="theme-cultura"
                            name="themes"
                            value="Cultura"
                    >
                </div>

                <div class="form">
                    <label for="theme-esporte-lazer">Esporte e Lazer</label>
                    <input type="checkbox"
                            id="theme-esporte-lazer"
                            name="themes"
                            value="Esporte e Lazer"
                    >
                </div>

                <div class="form">
                    <label for="theme-dir-humanos">Direitos Humanos</label>
                    <input type="checkbox"
                            id="theme-dir-humanos"
                            name="themes"
                            value="Direitos Humanos"
                    >
                </div>

                <div class="form">
                    <label for="themes-mulheres">Direitos das Mulheres</label>
                    <input type="checkbox"
                            id="themes-mulheres"
                            name="themes"
                            value="Mulheres"
                    >
                </div>

                <div class="form">
                    <label for="themes-racial">Igualdade Racial</label>
                    <input type="checkbox"
                            id="themes-racial"
                            name="themes"
                            value="Igualdade Racial"
                    >
                </div>

                <div class="form">
                    <label for="themes-juventude">Juventude</label>
                    <input type="checkbox"
                            id="themes-juventude"
                            name="themes"
                            value="Juventude"
                    >
                </div>

                <div class="form">
                    <label for="themes-acessibilidade">Acessibilidade</label>
                    <input type="checkbox"
                            id="themes-acessibilidade"
                            name="themes"
                            value="Pessoa com deficiencia"
                    >
                </div>
                
                <div class="form">
                    <label for="themes-idosa">Terceira idade</label>
                    <input type="checkbox"
                            id="themes-idosa"
                            name="themes"
                            value="Pessoas Idosas"
                    >
                </div>

                <div class="form">
                    <label for="themes-meio-ambiente">Meio Ambiente</label>
                    <input type="checkbox"
                            id="themes-meio-ambiente"
                            name="themes"
                            value="Meio Ambiente"
                    >
                </div>


                <div class="form">
                    <label for="themes-economia">Desenvolvimento Economico</label>
                    <input type="checkbox"
                            id="themes-economia"
                            name="themes"
                            value="Desenvolvimento Económico"
                    >
                </div>

                <div class="form">
                    <label for="themes-alimentacao">Segurânça Alimentar</label>
                    <input type="checkbox"
                            id="themes-alimentacao"
                            name="themes"
                            value="Segurança Alimentar"
                    >
                </div>

                <div class="form">
                    <label for="themes-seguranca">Segurança Publica</label>
                    <input type="checkbox"
                            id="themes-seguranca"
                            name="themes"
                            value="Segurança Publica"
                    >
                </div>
            </div>

            <div class="form-group">
                <p>Aceita os termos de contato ?</p>
                <label for="themes-consent">Aceito</label>
                <input type="checkbox"
                        id="themes-consent"
                        name="consent"
                        value="true"
                >
            </div>

            <div class="form-group">
                <button type="submit">
                    Cadastrar e visitar nosso grupo de zap
                </button>

            </div>
        </form>
    </div>
    <script src="script_cadastro.js"></script>

</body>
</html>
